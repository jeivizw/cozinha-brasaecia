<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Pedidos - Brasa & Cia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'barlow': ['Barlow', 'sans-serif'] },
                    colors: {
                        primary: '#ca3c3f',
                        dark: '#222222',
                        success: '#22c55e',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Barlow', sans-serif; background-color: #f4f4f4; }
        .order-card { transition: all 0.3s ease; }
        .status-badge {     @apply px-3 py-1 rounded-full text-xs font-bold uppercase; }
    </style>
</head>
<body class="text-dark">

    <header class="bg-dark text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-primary p-2 rounded-lg">
                    <img src="assets/images/logo.png" alt="Logo" class="h-8" onerror="this.style.display='none'">
                </div>
                <h1 class="text-xl font-extrabold tracking-tight">PAINEL DE PEDIDOS <span class="text-primary">| BRASA & CIA</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="relogio" class="font-mono bg-black/30 px-3 py-1 rounded text-sm">00:00:00</span>
                <div class="relative">
                    <span class="absolute -top-1 -right-1 bg-primary text-white text-[10px] w-4 h-4 flex justify-center items-center rounded-full animate-bounce" id="count-badge">0</span>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <div class="flex gap-4 mb-8 overflow-x-auto pb-2">
            <button onclick="filtrarPedidos('todos')" class="bg-dark text-white px-6 py-2 rounded-xl font-bold whitespace-nowrap">Todos</button>
            <button onclick="filtrarPedidos('pendente')" class="bg-white border border-gray-200 px-6 py-2 rounded-xl font-bold hover:bg-gray-50 whitespace-nowrap">Pendentes</button>
            <button onclick="filtrarPedidos('preparo')" class="bg-white border border-gray-200 px-6 py-2 rounded-xl font-bold hover:bg-gray-50 whitespace-nowrap">Em Preparo</button>
            <button onclick="filtrarPedidos('entrega')" class="bg-white border border-gray-200 px-6 py-2 rounded-xl font-bold hover:bg-gray-50 whitespace-nowrap">Saiu para Entrega</button>
        </div>

        <div id="grid-pedidos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center text-gray-400">
                <p>Aguardando novos pedidos...</p>
            </div>
        </div>
    </main>

    <div id="modal-pedido" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl p-6 shadow-2xl">
            <div id="modal-content"></div>
            <button onclick="fecharModal()" class="mt-6 w-full py-3 bg-gray-200 rounded-xl font-bold text-dark">Fechar</button>
        </div>
    </div>

    <script>
        // Simulando Banco de Dados de Pedidos
        let pedidos = [
            {
                id: "1052",
                cliente: "João Silva",
                telefone: "(15) 99123-4567",
                itens: [
                    { nome: "Picanha Premium", qtd: 1, preco: 91.90 },
                    { nome: "T-bone Steak", qtd: 2, preco: 119.90 }
                ],
                total: 211.80,
                status: "pendente",
                hora: "19:45",
                localizacao: { lat: -23.5015, lon: -47.4521 }
            },
            {
                id: "1053",
                cliente: "Maria Oliveira",
                telefone: "(15) 98877-6655",
                itens: [
                    { nome: "Combo Linguiça Toscana", qtd: 1, preco: 49.00 },
                    { nome: "Coca 350ml", qtd: 1, preco: 7.90 }
                ],
                total: 56.90,
                status: "preparo",
                hora: "20:05",
                localizacao: { lat: -23.5100, lon: -47.4600 }
            }
        ];

        function renderizarPedidos(lista = pedidos) {
            const grid = document.getElementById('grid-pedidos');
            const badge = document.getElementById('count-badge');
            badge.innerText = lista.filter(p => p.status === 'pendente').length;
            
            grid.innerHTML = '';

            lista.forEach(p => {
                const statusCores = {
                    pendente: "bg-red-100 text-red-600",
                    preparo: "bg-warning/20 text-warning",
                    entrega: "bg-blue-100 text-blue-600",
                    concluido: "bg-success/20 text-success"
                };

                const card = document.createElement('div');
                card.className = "order-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-md";
                card.innerHTML = `
                    <div class="p-4 border-b border-gray-50 flex justify-between items-center bg-gray-50/50">
                        <div>
                            <span class="text-xs text-gray-400 block uppercase font-bold">Pedido #${p.id}</span>
                            <h3 class="font-bold text-lg">${p.cliente}</h3>
                        </div>
                        <span class="status-badge ${statusCores[p.status]}">${p.status}</span>
                    </div>
                    
                    <div class="p-4 flex-1">
                        <ul class="space-y-2 mb-4">
                            ${p.itens.map(item => `
                                <li class="flex justify-between text-sm">
                                    <span><b class="text-primary">${item.qtd}x</b> ${item.nome}</span>
                                    <span class="font-medium text-gray-500">R$ ${item.preco.toFixed(2)}</span>
                                </li>
                            `).join('')}
                        </ul>
                        
                        <div class="bg-gray-50 rounded-xl p-3 text-xs text-gray-500 mb-4">
                            <p><b>Hora:</b> ${p.hora}</p>
                            <p><b>Tel:</b> ${p.telefone}</p>
                            <p class="truncate"><b>Localização:</b> ${p.localizacao.lat.toFixed(4)}, ${p.localizacao.lon.toFixed(4)}</p>
                        </div>

                        <div class="flex justify-between items-center mb-4">
                            <span class="text-gray-400 font-bold">TOTAL</span>
                            <span class="text-xl font-black text-primary">R$ ${p.total.toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="p-4 bg-gray-50 grid grid-cols-2 gap-2">
                        <button onclick="alterarStatus('${p.id}', 'preparo')" class="bg-warning text-white py-2 rounded-lg text-xs font-bold hover:opacity-90">PREPARAR</button>
                        <button onclick="alterarStatus('${p.id}', 'entrega')" class="bg-blue-500 text-white py-2 rounded-lg text-xs font-bold hover:opacity-90">SAIU ENTREGA</button>
                        <button onclick="abrirMapa(${p.localizacao.lat}, ${p.localizacao.lon})" class="col-span-2 border border-dark text-dark py-2 rounded-lg text-xs font-bold hover:bg-dark hover:text-white transition-colors">VER NO MAPA (GPS)</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function alterarStatus(id, novoStatus) {
            const index = pedidos.findIndex(p => p.id === id);
            if (index !== -1) {
                pedidos[index].status = novoStatus;
                renderizarPedidos();
                // Aqui entraria o fetch para atualizar no seu banco de dados real
                console.log(`Pedido ${id} alterado para ${novoStatus}`);
            }
        }

        function abrirMapa(lat, lon) {
            window.open(`https://www.google.com/maps?q=${lat},${lon}`, '_blank');
        }

        function filtrarPedidos(status) {
            if (status === 'todos') {
                renderizarPedidos(pedidos);
            } else {
                const filtrados = pedidos.filter(p => p.status === status);
                renderizarPedidos(filtrados);
            }
        }

        // Relógio do Painel
        setInterval(() => {
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Inicialização
        renderizarPedidos();

    </script>
</body>
</html>
